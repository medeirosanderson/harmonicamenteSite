    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/stylebaralho1.css" />
    <title>Harmônica | Login</title>
    </head>

    <body class="page-login">
    <img src="./styles/img/logo.png" alt="Logo Harmonica" class="logo-flutuante">

    <div class="login-wrapper">
        <div class="login-card">
        <h1 class="login-title">Acesso de Professores</h1>
        <p class="login-subtitle">
            Digite a senha para acessar os baralhos.
        </p>

        <form class="login-form">
            <label class="login-label" for="senha">Senha</label>
            <input
            id="senha"
            class="login-input"
            type="password"
            placeholder="Senha de acesso"
            autocomplete="current-password"
            />

            <!-- mensagem de erro (por enquanto escondida; depois o JS mostra) -->
            <p class="login-error">Senha incorreta.</p>

            <button class="button-random login-btn" type="button">
            Entrar
            </button>

            <a class="login-back" href="index.html">Voltar</a>
        </form>
        </div>
    </div>
    <script src="./scripts/login.js"></script>
    </body>
    </html>
